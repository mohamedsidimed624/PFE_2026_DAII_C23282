spring.application.name=backend

server.error.include-message=never

server.port=${PORT:8080}

# Base de données — en production, définir DB_URL, DB_USERNAME, DB_PASSWORD
# Les valeurs par défaut ci-dessous sont réservées au développement local uniquement
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/onmm_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:34509008ma}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Logs SQL — désactivés par défaut (production-safe)
# Pour activer en développement : spring.profiles.active=dev
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn

# SMTP — en production, définir MAIL_USERNAME et MAIL_PASSWORD
# Sans ces variables, l'application démarre mais les emails ne seront pas envoyés
# (les méthodes d'envoi sont @Async — l'échec SMTP ne bloque pas l'application)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
# Adresse expéditeur (From) — distinct du login SMTP pour les relais comme Brevo
app.mail-from=${MAIL_FROM:${MAIL_USERNAME:}}
brevo.api-key=${BREVO_API_KEY:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Stockage objet compatible S3 (Backblaze B2, Cloudflare R2, etc.) — remplace le disque local (éphémère en prod).
# Bucket privé "uploads" (photos, documents, images), servi via /api/files/** (FileController).
# Si r2.endpoint n'est pas défini (ex. en local sans compte cloud), l'application bascule
# automatiquement sur le disque local (storage.local-dir) — voir ObjectStorageService.
r2.endpoint=${R2_ENDPOINT:}
r2.region=${R2_REGION:auto}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.uploads-bucket=${R2_UPLOADS_BUCKET:}
storage.local-dir=${STORAGE_LOCAL_DIR:uploads}

# Limites multipart — protection contre les uploads excessifs avant d'atteindre le service
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

app.sondage.hash-secret=onmm-sondage-secret-dev
app.contact-email=${CONTACT_EMAIL:mohamedsidimed64@gmail.com}

# Secret racine unique du module élections — dérivé par étiquette (HMAC) pour chaque usage
# (jeton électeur pseudonyme, chiffrement au repos des clés privées RSA/Ed25519).
# En production : définir ELECTION_MASTER_SECRET.
app.election.master-secret=${ELECTION_MASTER_SECRET:onmm-election-master-secret-2026-change-in-prod}

# JWT — la variable d'environnement JWT_SECRET est obligatoire (le profil dev la fournit
# via application-dev.properties ; sans profil dev, l'application refuse de démarrer)
jwt.secret=${JWT_SECRET:ZmFrZVNlY3JldEZvckRldmVsb3BtZW50T25seTEyMzQ1Njc4OTA=}
# Durée de validité des JWT — surchargeable via JWT_EXPIRATION_MS
# 28800000 = 8h (valeur prod raisonnable) ; le profil dev surcharge à 24h
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

