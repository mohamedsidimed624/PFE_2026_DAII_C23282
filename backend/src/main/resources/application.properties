spring.application.name=backend

server.error.include-message=never

server.port=8080

# Base de données — en production, définir DB_URL, DB_USERNAME, DB_PASSWORD
# Les valeurs par défaut ci-dessous sont réservées au développement local uniquement
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/onmm_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:34509008ma}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Logs SQL — désactivés par défaut (production-safe)
# Pour activer en développement : spring.profiles.active=dev
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn

# SMTP — en production, définir MAIL_USERNAME et MAIL_PASSWORD
# Sans ces variables, l'application démarre mais les emails ne seront pas envoyés
# (les méthodes d'envoi sont @Async — l'échec SMTP ne bloque pas l'application)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=http://localhost:5173

upload.dir=uploads

# Limites multipart — protection contre les uploads excessifs avant d'atteindre le service
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

app.sondage.hash-secret=onmm-sondage-secret-dev
app.election.hash-secret=${ELECTION_HASH_SECRET:onmm-election-hash-2026-secret-key}
app.contact-email=${CONTACT_EMAIL:contact@ordre-medecins.mr}

# JWT — en production, définir la variable d'environnement JWT_SECRET
# La valeur par défaut ci-dessous est réservée au développement local uniquement
jwt.secret=${JWT_SECRET:b25tbS1qd3Qtc2VjcmV0LWRldi1vbmx5LTIwMjYtb25tbQ==}
# Durée de validité des JWT en millisecondes — surchargeable via JWT_EXPIRATION_MS
# 86400000 = 24h (valeur par défaut PFE — recommandation production : 900000 = 15 min)
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

