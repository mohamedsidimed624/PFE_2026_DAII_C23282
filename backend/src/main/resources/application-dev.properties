# Configuration développement local — chargée uniquement avec spring.profiles.active=dev
#
# IntelliJ : Run/Debug Configurations → Active Profiles → "dev"
#            OU VM options : -Dspring.profiles.active=dev
# Ligne de commande : java -jar backend.jar --spring.profiles.active=dev

# Logs SQL — debug uniquement en développement
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
spring.jpa.properties.hibernate.format_sql=true

# Logs applicatifs plus verbeux en dev
logging.level.com.onmm.backend=debug

# JWT — durée longue en dev pour éviter les reconnexions fréquentes
jwt.expiration-ms=86400000
